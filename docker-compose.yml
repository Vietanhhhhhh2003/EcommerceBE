services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - mongodb
      - redis
      - maildev
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/ecommerce_backend
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: change-me-access-secret
      JWT_REFRESH_SECRET: change-me-refresh-secret
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      REFRESH_TOKEN_EXPIRES_SECONDS: 604800
      VNPAY_TMN_CODE: change-me-vnpay-terminal-code
      VNPAY_HASH_SECRET: change-me-vnpay-secret
      VNPAY_PAYMENT_URL: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
      VNPAY_RETURN_URL: http://localhost:5000/api/payments/vnpay/return
      VNPAY_IPN_URL: http://localhost:5000/api/payments/vnpay/ipn
      VNPAY_LOCALE: vn
      VNPAY_CURR_CODE: VND
      SMTP_HOST: maildev
      SMTP_PORT: 1025
      SMTP_SECURE: "false"
      SMTP_USER: replace-with-smtp-user
      SMTP_PASS: replace-with-smtp-password
      MAIL_FROM: demo@example.com
      UPLOAD_DIR: uploads
      PUBLIC_BASE_URL: http://localhost:5000
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  maildev:
    image: maildev/maildev:2.1.0
    ports:
      - "1080:1080"
      - "1025:1025"

volumes:
  mongodb_data:
  uploads_data:
